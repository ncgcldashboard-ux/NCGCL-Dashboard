document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"position:absolute;left:14px;top:50%;transform:translateY(-50%);z-index:60;\">\n      <ol style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"14\">\n          <li style=\"margin:0;\">\n            <button type=\"button\" sc-camel-on-click=\"{{ item.onClick }}\" style=\"display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;font-family:inherit;padding:2px;\">\n              <span style=\"width:8px;height:8px;border-radius:50%;border:1.5px solid {{ item.dotBorder }};background:{{ item.dotBg }};transition:all .25s;\"><\u002Fspan>\n              <span style=\"font-size:11px;letter-spacing:.13em;text-transform:uppercase;white-space:nowrap;opacity:{{ item.lblOpacity }};color:{{ item.lblColor }};transition:all .25s;\">{{ item.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fli>\n        <\u002Fsc-for>\n      <\u002Fol>\n    <\u002Fnav>\n  <\u002Fsc-if>\n\n  <div ref=\"{{ scrollRef }}\" style=\"position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;scroll-snap-type:y proximity;\">\n\n    <!-- 01 COVER -->\n    <section id=\"s1\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#035076;background-image:radial-gradient(rgba(255,255,255,.055) 1px, transparent 1.2px);background-size:26px 26px;color:#EAF3EE;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:12px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:#8FCB9B;margin-bottom:24px;\">National Credit Guarantee Company Limited<\u002Fdiv>\n        <h1 style=\"margin:0;font-size:clamp(38px,5.6vw,74px);font-weight:500;letter-spacing:-.02em;line-height:1.03;max-width:920px;\">Agricultural Storage Infrastructure Finance Facility<\u002Fh1>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(234,243,238,.82);max-width:64ch;margin:26px 0 0;\">A catalytic <strong style=\"color:#fff;font-weight:600;\">counter-guarantee architecture<\u002Fstrong> that unlocks private, fixed-rate investment in accredited commercial warehousing — NCGCL as principal guarantor, an unfunded IFC Risk-Sharing Facility behind it, and a pre-funded reserve that makes long-tenor warehouse debt bankable.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin-top:36px;border:1px solid rgba(255,255,255,.16);border-radius:12px;overflow:hidden;\">\n          <div style=\"padding:18px 20px;border-right:1px solid rgba(255,255,255,.12);\"><div style=\"font-size:clamp(22px,2.4vw,32px);font-weight:500;color:#fff;line-height:1;\">Rs 20.16bn<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,243,238,.6);margin-top:8px;line-height:1.3;\">PFI senior debt, Phase I<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px 20px;border-right:1px solid rgba(255,255,255,.12);\"><div style=\"font-size:clamp(22px,2.4vw,32px);font-weight:500;color:#fff;line-height:1;\">1.0 MMT<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,243,238,.6);margin-top:8px;line-height:1.3;\">wheat-led accredited capacity<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px 20px;border-right:1px solid rgba(255,255,255,.12);\"><div style=\"font-size:clamp(22px,2.4vw,32px);font-weight:500;color:#fff;line-height:1;\">25%<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,243,238,.6);margin-top:8px;line-height:1.3;\">combined guarantee cap<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px 20px;border-right:1px solid rgba(255,255,255,.12);\"><div style=\"font-size:clamp(22px,2.4vw,32px);font-weight:500;color:#fff;line-height:1;\">$24.5M<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,243,238,.6);margin-top:8px;line-height:1.3;\">Phase I IFC commitment<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px 20px;\"><div style=\"font-size:clamp(22px,2.4vw,32px);font-weight:500;color:#fff;line-height:1;\">5.3×<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,243,238,.6);margin-top:8px;line-height:1.3;\">private mobilization multiple<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:30px;font-size:12.5px;letter-spacing:.04em;color:rgba(234,243,238,.62);line-height:1.7;\"><strong style=\"color:#fff;font-weight:600;\">ASIFF — Concept Paper<\u002Fstrong><br>Counter-guarantee credit · Pre-funded rate reserve · Commercial warehouse infrastructure &nbsp;|&nbsp; Prepared for IFC structuring &amp; investment teams · NCGCL · 2026<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(234,243,238,.5);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>Programme overview<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 02 INTRODUCTION -->\n    <section id=\"s2\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">02<\u002Fspan>Introduction · The post-harvest gap<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Pakistan finances the harvest. It has never financed what happens after.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:66ch;margin:0 0 4px;\">Public policy, financial institutions and development programs have concentrated on production — seeds, fertilizer, machinery, working capital. Comparatively little attention has gone to what happens after harvest: the sector remains <strong style=\"color:#035076;font-weight:600;\">structurally under-financed at the inventory stage<\u002Fstrong>, pushing producers and traders to liquidate stocks immediately, regardless of market conditions.<\u002Fp>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:66ch;margin:14px 0 0;\">The challenge is most acute in wheat. As public procurement is rationalized, the liquidity, inventory-management and stabilization functions the state once performed must increasingly be carried by private participants — which requires institutions, infrastructure and risk-sharing arrangements capable of supporting that transition.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:22px;\">\n          <span style=\"font-size:12.5px;border:1.5px solid rgba(3,80,118,.32);color:rgba(3,80,118,.74);border-radius:999px;padding:5px 13px;\">Seasonal price volatility<\u002Fspan>\n          <span style=\"font-size:12.5px;border:1.5px solid rgba(3,80,118,.32);color:rgba(3,80,118,.74);border-radius:999px;padding:5px 13px;\">Weak price discovery<\u002Fspan>\n          <span style=\"font-size:12.5px;border:1.5px solid rgba(3,80,118,.32);color:rgba(3,80,118,.74);border-radius:999px;padding:5px 13px;\">Constrained private stockholding<\u002Fspan>\n          <span style=\"font-size:12.5px;border:1.5px solid rgba(3,80,118,.32);color:rgba(3,80,118,.74);border-radius:999px;padding:5px 13px;\">Under-investment in modern storage<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:22px 0 0;max-width:80ch;\">NCGCL's proposed post-procurement architecture responds with two distinct, complementary facilities — this paper concerns the second of them.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>Introduction<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 03 TWO CONSTRAINTS -->\n    <section id=\"s3\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">03<\u002Fspan>The diagnosis · Two distinct constraints<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Liquidity and infrastructure are different problems — and need different instruments.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:66ch;margin:0 0 4px;\">A liquidity-constrained farmer and a storage-constrained trader can look similar in the market, but require fundamentally different interventions. Treating both through a single instrument risks misallocating resources while resolving neither.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:22px;background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:12px;overflow:hidden;\">\n          <div style=\"padding:22px 24px;border-right:1.5px dashed rgba(3,80,118,.32);\">\n            <h4 style=\"margin:0 0 12px;font-size:16px;font-weight:600;color:#035076;\">Smallholders — a liquidity problem (WLPSF)<\u002Fh4>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#035076;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Immediate cash needs and input-repayment obligations compel producers to sell at or near harvest.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#035076;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Limited access to formal credit forces sale when prices are typically under pressure.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#035076;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Requires financing that enables deferred sale — the Wheat Liquidity &amp; Price Stabilization Facility.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:22px 24px;\">\n            <h4 style=\"margin:0 0 12px;font-size:16px;font-weight:600;color:#278B58;\">Commercial participants — an infrastructure problem (ASIFF)<\u002Fh4>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#278B58;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Traders, processors, exporters and millers need accredited storage at scale.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#278B58;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Requires inventory finance and risk-sharing mechanisms that let commodities be stored, aggregated and traded over time.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#278B58;margin-top:8px;flex:none;\"><\u002Fspan><span style=\"font-size:13.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Requires long-term, fixed-rate infrastructure finance — the Agricultural Storage Infrastructure Finance Facility.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;background:rgba(3,80,118,.05);border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:14px 18px;font-size:15.5px;line-height:1.55;color:rgba(3,80,118,.74);\"><strong style=\"color:#035076;\">This paper concerns ASIFF:<\u002Fstrong> the commercial storage and inventory-financing constraint, addressed through a dedicated infrastructure-finance architecture.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The diagnosis<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 04 STORAGE THESIS -->\n    <section id=\"s4\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">04<\u002Fspan>The case · Why commercial storage matters<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Storage is inventory management — not price arbitrage.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">With domestic production costs near import parity, the import price suppresses the seasonal ceiling — the speculative carry trade that justifies storage elsewhere does not reliably exist here. The correct rationale is operational: these needs exist regardless of seasonal price movements.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:20px;\">\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Millers<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Year-round raw-material access.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Processors<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Production-schedule buffers.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Exporters<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Aggregation, grading, dispatch.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Traders<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Temporal / geographic bridge.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;background:rgba(3,80,118,.05);border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:14px 18px;font-size:15.5px;line-height:1.55;color:rgba(3,80,118,.74);\"><strong style=\"color:#035076;\">The reframe:<\u002Fstrong> warehousing is a logistics and supply-chain infrastructure business, not a price-arbitrage business — it reduces post-harvest losses, supports quality certification, and creates the collateral base for inventory-backed financing.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The case<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 05 THE GAP AND THE FACILITY -->\n    <section id=\"s5\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">05<\u002Fspan>The case · The financing gap &amp; the facility<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Risk perceptions and financing constraints keep capital out. ASIFF is the catalytic response.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">Warehouse projects need significant upfront capital and long horizons. Banks are reluctant to finance development at scale — construction risk, collateral-valuation difficulty, and interest-rate volatility make floating-rate debt incompatible with long-dated warehouse cash flows. <strong style=\"color:#035076;font-weight:600;\">ASIFF is a risk-sharing and infrastructure-financing platform<\u002Fstrong> designed to catalyze private investment in accredited agricultural warehousing across Pakistan's major surplus-producing regions.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:11px;margin-top:20px;\">\n          <div style=\"background:#fff;border:1.5px solid rgba(21,110,103,.4);border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.4;color:rgba(3,80,118,.74);\"><strong style=\"display:block;font-size:16px;font-weight:500;color:#156E67;letter-spacing:-.01em;\">Not<\u002Fstrong>a procurement programme<\u002Fdiv>\n          <div style=\"background:#fff;border:1.5px solid rgba(21,110,103,.4);border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.4;color:rgba(3,80,118,.74);\"><strong style=\"display:block;font-size:16px;font-weight:500;color:#156E67;letter-spacing:-.01em;\">Not<\u002Fstrong>a commodity-financing facility<\u002Fdiv>\n          <div style=\"background:#fff;border:1.5px solid rgba(21,110,103,.4);border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.4;color:rgba(3,80,118,.74);\"><strong style=\"display:block;font-size:16px;font-weight:500;color:#156E67;letter-spacing:-.01em;\">Not<\u002Fstrong>a price-support mechanism<\u002Fdiv>\n          <div style=\"background:#fff;border:1.5px solid rgba(21,110,103,.4);border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.4;color:rgba(3,80,118,.74);\"><strong style=\"display:block;font-size:16px;font-weight:500;color:#156E67;letter-spacing:-.01em;\">Is<\u002Fstrong>an infrastructure-finance intervention<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:20px 0 0;max-width:80ch;\">ASIFF targets commercial counterparties capable of operating storage assets at scale: warehouse operators, commodity traders, millers, processors, exporters, agribusinesses and other qualified sponsors.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The case<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 06 GEOGRAPHIC STRATEGY -->\n    <section id=\"s6\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">06<\u002Fspan>The case · Geographic deployment strategy<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Concentration over coverage: Phase I anchors on Punjab and Sindh.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">Dispersing capacity thinly across many districts produces neither utilization nor receipt-market depth. Concentrating it in a small number of clusters creates standardized commodity pools capable of supporting exchange-traded electronic warehouse receipts (EWRs) — directly complementary to IFC's advisory work with SECP and the Pakistan Mercantile Exchange.<\u002Fp>\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;overflow:hidden;\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">Stage<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">Accredited capacity<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">IFC notional<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\"><strong style=\"color:#035076;\">Phase I<\u002Fstrong><\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">1.0 MMT (~67 warehouses)<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">$13.5M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Cycle 1<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">1.5 MMT (~100 warehouses)<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">~$20M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:#035076;font-weight:600;background:#EDF4EE;padding:9px 14px;border-top:1.5px solid rgba(3,80,118,.32);\">Steady state<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:#035076;font-weight:600;background:#EDF4EE;padding:9px 14px;border-top:1.5px solid rgba(3,80,118,.32);\">5.56 MMT (~370 warehouses)<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:#035076;font-weight:600;background:#EDF4EE;padding:9px 14px;border-top:1.5px solid rgba(3,80,118,.32);\">~$75M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:18px 0 0;max-width:80ch;\">The same architecture extends in later phases to cotton, rice-led and sugar corridors and cold-chain assets.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The case<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 07 WAREHOUSE MODEL -->\n    <section id=\"s7\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">07<\u002Fspan>The instrument · Warehouse development model<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">A standard 15,000-ton node, multi-commodity by design.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">A warehouse financed on a seven-year tenor cannot service its debt on a single Rabi wheat-storage window. <strong style=\"color:#035076;font-weight:600;\">Multi-commodity rotation is load-bearing for credit quality<\u002Fstrong> — Rabi wheat, then Kharif maize and rice — sustaining the occupancy and cash-flow profile a 1.25× DSCR covenant requires, without enlarging the guaranteed notional.<\u002Fp>\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;overflow:hidden;\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">Unit economics — 15,000-ton node<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">PKR<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">USD<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Total capex<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Rs 504 M<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">$1.80 M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Sponsor equity (40%, hard minimum)<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Rs 202 M<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">$0.72 M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">PFI senior debt (60% LTV — the layer ASIFF guarantees)<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Rs 302 M<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">$1.08 M<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;\">Tenor · Target DSCR<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;\" colspan=\"2\">7 years (18-mo grace) · 1.25×<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:18px 0 0;max-width:80ch;\">Larger hub facilities of 30,000–50,000 tons may be developed where commodity volumes and logistics justify greater scale (~Rs 28,500/ton at a 40k-ton hub).<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The instrument<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 08 FINANCIAL ARCHITECTURE -->\n    <section id=\"s8\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">08<\u002Fspan>The instrument · Financial architecture<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Each dollar of concessional capacity mobilizes 26.67× in warehouse capex.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">Concessional capacity is <strong style=\"color:#035076;font-weight:600;\">leveraged, not consumed.<\u002Fstrong> NCGCL provides structured credit enhancement to PFIs, mobilizing lending into a sector underserved by conventional infrastructure finance.<\u002Fp>\n        <div style=\"margin-top:20px;background:#fff;border:1px solid rgba(3,80,118,.32);border-radius:12px;padding:clamp(18px,2.4vw,28px);box-shadow:0 18px 40px -28px rgba(3,80,118,.35);\">\n          <div style=\"display:flex;align-items:stretch;flex-wrap:wrap;gap:12px;justify-content:center;\">\n            <div style=\"border-radius:10px;padding:14px 18px;min-width:150px;text-align:center;color:#fff;background:#035076;\"><div style=\"font-size:clamp(18px,1.8vw,24px);font-weight:500;line-height:1;\">$1.00<\u002Fdiv><div style=\"font-size:11px;margin-top:6px;opacity:.9;line-height:1.3;\">IFC risk capacity<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;font-size:24px;color:rgba(3,80,118,.52);font-weight:500;\">×4<\u002Fdiv>\n            <div style=\"border-radius:10px;padding:14px 18px;min-width:150px;text-align:center;color:#fff;background:#156E67;\"><div style=\"font-size:clamp(18px,1.8vw,24px);font-weight:500;line-height:1;\">$4.00<\u002Fdiv><div style=\"font-size:11px;margin-top:6px;opacity:.9;line-height:1.3;\">notional guarantee capacity<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;font-size:24px;color:rgba(3,80,118,.52);font-weight:500;\">÷25%<\u002Fdiv>\n            <div style=\"border-radius:10px;padding:14px 18px;min-width:150px;text-align:center;color:#fff;background:#1E7D60;\"><div style=\"font-size:clamp(18px,1.8vw,24px);font-weight:500;line-height:1;\">$16.00<\u002Fdiv><div style=\"font-size:11px;margin-top:6px;opacity:.9;line-height:1.3;\">PFI loan portfolio<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;font-size:24px;color:rgba(3,80,118,.52);font-weight:500;\">÷60%<\u002Fdiv>\n            <div style=\"border-radius:10px;padding:14px 18px;min-width:150px;text-align:center;color:#fff;background:#309A51;\"><div style=\"font-size:clamp(18px,1.8vw,24px);font-weight:500;line-height:1;\">$26.67<\u002Fdiv><div style=\"font-size:11px;margin-top:6px;opacity:.9;line-height:1.3;\">warehouse capex (LTV)<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;font-size:clamp(20px,2.2vw,26px);font-weight:500;color:#278B58;margin-top:14px;\">≈ 222,000 tons of accredited capacity per $1 of concessional capacity<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:16px;\">\n          <div style=\"background:#fff;border:1.5px solid rgba(3,80,118,.32);border-radius:10px;padding:12px 15px;font-size:13px;color:rgba(3,80,118,.74);line-height:1.4;\"><strong style=\"display:block;font-size:20px;font-weight:500;color:#035076;letter-spacing:-.01em;margin-bottom:2px;\">Option A · MSR<\u002Fstrong>Markup Stabilization Reserve — a pre-funded buy-down reserve compensating PFIs when KIBOR exceeds the fixed rate by 300bps for three months, capped at 400–500bps.<\u002Fdiv>\n          <div style=\"background:#fff;border:1.5px solid rgba(57,169,73,.5);border-radius:10px;padding:12px 15px;font-size:13px;color:rgba(3,80,118,.74);line-height:1.4;\"><strong style=\"display:block;font-size:20px;font-weight:500;color:#309A51;letter-spacing:-.01em;margin-bottom:2px;\">Option B · MVG<\u002Fstrong>Markup Volatility Guarantee — supports project cash flows above a benchmark PKRV threshold; PFI enjoys the spread when KIBOR falls below it.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The instrument<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 09 RISK-SHARING STRUCTURE -->\n    <section id=\"s9\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">09<\u002Fspan>The instrument · Proposed risk-sharing structure<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">A counter-guarantee architecture — NCGCL principal, IFC reinsurer.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">Risk flows <strong style=\"color:#035076;font-weight:600;\">PFI → NCGCL → IFC<\u002Fstrong> — a reinsurance structure, not a junior-capital stack. NCGCL issues the guarantee directly to PFIs; an unfunded IFC facility reimburses NCGCL 75% of every payment from the first rupee.<\u002Fp>\n        <div style=\"margin-top:18px;\">\n          <div style=\"display:flex;gap:14px;align-items:stretch;margin-bottom:10px;\">\n            <div style=\"flex:0 0 44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;background:#8EA8B8;\">3rd<\u002Fdiv>\n            <div style=\"flex:1;background:rgba(3,80,118,.06);border-left:3px solid #8EA8B8;border-radius:0 8px 8px 0;padding:12px 16px;\"><div style=\"font-weight:600;font-size:14px;margin-bottom:4px;color:#035076;\">PFI — residual, above 25%, uncapped<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.4;\">Rs 15.12 Bn / $54.0 M at Phase I. Losses above the guarantee cap sit entirely with the lender — no full risk transfer.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:stretch;margin-bottom:10px;\">\n            <div style=\"flex:0 0 44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;background:#0C5F6F;\">2nd<\u002Fdiv>\n            <div style=\"flex:1;background:rgba(12,95,111,.10);border-left:3px solid #0C5F6F;border-radius:0 8px 8px 0;padding:12px 16px;\"><div style=\"font-weight:600;font-size:14px;margin-bottom:4px;color:#0C5F6F;\">NCGCL net retention — 6.25% of portfolio<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.4;\">Rs 1.26 Bn / $4.5 M at Phase I — well within NCGCL's balance-sheet capacity as national credit guarantee agency.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:stretch;\">\n            <div style=\"flex:0 0 44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;background:#39A949;\">1st<\u002Fdiv>\n            <div style=\"flex:1;background:rgba(57,169,73,.12);border-left:3px solid #39A949;border-radius:0 8px 8px 0;padding:12px 16px;\"><div style=\"font-weight:600;font-size:14px;margin-bottom:4px;color:#1E7D60;\">IFC counter-guarantee — 75% of NCGCL payout, unfunded<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.4;\">Rs 3.78 Bn / $13.5 M contingent — economic first-loss-equivalent; deploys no cash unless claims crystallize.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The instrument<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 10 INSTITUTIONAL ROLES -->\n    <section id=\"s10\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">10<\u002Fspan>The instrument · Institutional roles<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Six parties, six distinct roles.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(3,80,118,.74);max-width:68ch;margin:0 0 4px;\">NCGCL is the single national credit-guarantee counterparty for the post-procurement wheat economy — the principal, not the administrator of a third party's facility.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:20px;\">\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">NCGCL<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Principal guarantor — issues guarantees, carries them on its own book, makes payout decisions.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">IFC — credit<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Unfunded Risk-Sharing Facility counter-guarantees 75% of NCGCL's exposure.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">IFC — rate<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Funds the MSR pre-funded buy-down reserve from concessional / donor VGF resources.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">PFIs<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Provide senior debt and retain the uncapped residual above the 25% cap.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Sponsors<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">Develop and operate the assets; retain full 40% equity exposure throughout.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><h4 style=\"margin:0 0 8px;font-size:16px;font-weight:500;color:#035076;\">Regulators<\u002Fh4><p style=\"margin:0;font-size:12.5px;color:rgba(3,80,118,.74);line-height:1.45;\">SECP and provincial/federal bodies — accreditation, oversight, EWR infrastructure.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The instrument<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 11 ROADMAP -->\n    <section id=\"s11\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">11<\u002Fspan>Delivery · Implementation roadmap<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">A wheat-anchored tranche of a larger risk-sharing envelope.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px;\">\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:11px;padding:16px 15px 14px;\">\n            <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;margin-bottom:10px;background:#035076;\">1<\u002Fdiv>\n            <h4 style=\"margin:0 0 7px;font-size:14px;font-weight:600;color:#035076;\">Phase I<\u002Fh4>\n            <p style=\"margin:0;font-size:13px;color:rgba(3,80,118,.74);line-height:1.45;\">Secures the IFC counter-guarantee, confirms PFI participation, validates underwriting. ~1.0 MMT, ~67 warehouses; PFI debt Rs 20.16 Bn / $72.0 M; IFC notional $13.5 M.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:11px;padding:16px 15px 14px;\">\n            <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;margin-bottom:10px;background:#156E67;\">2<\u002Fdiv>\n            <h4 style=\"margin:0 0 7px;font-size:14px;font-weight:600;color:#035076;\">Phase II<\u002Fh4>\n            <p style=\"margin:0;font-size:13px;color:rgba(3,80,118,.74);line-height:1.45;\">Expands toward Cycle-1 target of ~1.5 MMT (~100 warehouses); replicates across additional clusters; activates the first MSR standby tranche.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:11px;padding:16px 15px 14px;\">\n            <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;margin-bottom:10px;background:#309A51;\">3<\u002Fdiv>\n            <h4 style=\"margin:0 0 7px;font-size:14px;font-weight:600;color:#035076;\">Phase III<\u002Fh4>\n            <p style=\"margin:0;font-size:13px;color:rgba(3,80,118,.74);line-height:1.45;\">Develops the ecosystem — inventory finance, warehouse-receipt financing, commodity-backed lending, cold-chain, corridor expansion into cotton, rice-led, sugar.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:18px 0 0;max-width:80ch;\">At the steady-state ceiling of ~5.56 MMT (~370 warehouses), the IFC counter-guarantee notional scales to roughly $75 million on the wheat anchor alone.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>Delivery<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 12 KEY RISKS -->\n    <section id=\"s12\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">12<\u002Fspan>Delivery · Key risks and mitigants<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">Construction-phase risk is where loss content is highest — and where the concessional layer sits.<\u002Fh2>\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;margin-top:16px;background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;overflow:hidden;\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:9px 12px;border-bottom:1px solid rgba(3,80,118,.32);\">Risk<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:9px 12px;border-bottom:1px solid rgba(3,80,118,.32);\">Phase<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:9px 12px;border-bottom:1px solid rgba(3,80,118,.32);\">LGD<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:9px 12px;border-bottom:1px solid rgba(3,80,118,.32);\">Primary mitigant<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Construction / completion<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Construction<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;text-align:right;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">40–60%<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">18-mo grace; staged disbursement; 40% sponsor equity ahead of debt<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Utilization / ramp<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Operating<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;text-align:right;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">20–35%<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Multi-commodity rotation; 6-mo ramp grace; surplus-corridor siting<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Sponsor credit / default<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Operating<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;text-align:right;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">20–35%<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Sponsor selection criteria; 40% equity minimum; insurable collateral<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Lender participation<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Both<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;text-align:right;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">—<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;border-bottom:1px solid rgba(3,80,118,.15);\">Counter-guarantee reduces credit exposure; pre-funded MSR removes rate risk<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;\">Regulatory / policy continuity<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;\">Both<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;text-align:right;color:rgba(3,80,118,.74);padding:8px 12px;\">—<\u002Fsc-raw-td><sc-raw-td style=\"font-size:12.5px;color:rgba(3,80,118,.74);padding:8px 12px;\">Infrastructure-finance instrument, not price support; independent of EWR go-live<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n        <p style=\"font-size:12.5px;color:rgba(3,80,118,.52);line-height:1.55;font-style:italic;margin:16px 0 0;max-width:80ch;\">A functioning warehouse is an insurable asset with operating cash flows — operating-phase LGD is materially lower than construction-phase.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>Delivery<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 13 INDICATIVE ASK -->\n    <section id=\"s13\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#F5F8F4;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#1E7D60;margin-bottom:14px;\"><span style=\"color:#035076;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(3,80,118,.32);\">13<\u002Fspan>The ask · Indicative commitment<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#035076;text-wrap:balance;\">One unfunded instrument, one funded reserve, drawn as the portfolio scales.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:18px;\">\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><div style=\"font-size:clamp(24px,2.5vw,32px);font-weight:500;line-height:1.05;color:#035076;\">$13.5M<\u002Fdiv><div style=\"font-size:13px;color:rgba(3,80,118,.74);margin-top:6px;line-height:1.4;\">IFC counter-guarantee — unfunded RSF<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:16px 18px 14px;\"><div style=\"font-size:clamp(24px,2.5vw,32px);font-weight:500;line-height:1.05;color:#035076;\">$11.0M<\u002Fdiv><div style=\"font-size:13px;color:rgba(3,80,118,.74);margin-top:6px;line-height:1.4;\">MSR — pre-funded reserve, Phase I<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1.5px solid rgba(57,169,73,.5);border-radius:10px;padding:16px 18px 14px;\"><div style=\"font-size:clamp(24px,2.5vw,32px);font-weight:500;line-height:1.05;color:#278B58;\">$24.5M<\u002Fdiv><div style=\"font-size:13px;color:rgba(3,80,118,.74);margin-top:6px;line-height:1.4;\">Phase I total commitment<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;margin-top:18px;background:#fff;border:1px solid rgba(3,80,118,.15);border-radius:10px;overflow:hidden;\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">MSR standby tranche<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:left;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">Phase<\u002Fsc-raw-th>\n            <sc-raw-th style=\"font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:rgba(3,80,118,.52);text-align:right;padding:11px 14px;border-bottom:1px solid rgba(3,80,118,.32);\">Up to (USD M)<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Tranche 1<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Phase II<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">11.0<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Tranche 2<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">Phase III<\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:rgba(3,80,118,.74);padding:9px 14px;border-bottom:1px solid rgba(3,80,118,.15);\">14.0<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"font-size:13.5px;color:#035076;font-weight:600;background:#EDF4EE;padding:9px 14px;border-top:1.5px solid rgba(3,80,118,.32);\">Programme envelope<\u002Fsc-raw-td><sc-raw-td style=\"background:#EDF4EE;border-top:1.5px solid rgba(3,80,118,.32);\"><\u002Fsc-raw-td><sc-raw-td style=\"font-size:13.5px;text-align:right;color:#035076;font-weight:600;background:#EDF4EE;padding:9px 14px;border-top:1.5px solid rgba(3,80,118,.32);\">36.0<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n        <div style=\"margin-top:16px;background:rgba(3,80,118,.05);border:1px solid rgba(3,80,118,.15);border-radius:10px;padding:14px 18px;font-size:14.5px;line-height:1.55;color:rgba(3,80,118,.74);\"><strong style=\"color:#035076;\">Additionality:<\u002Fstrong> counter-guarantee + MSR unlock lending banks won't provide unaided. <strong style=\"color:#035076;\">Capacity:<\u002Fstrong> NCGCL net retention is 6.25% — within balance-sheet capacity. <strong style=\"color:#035076;\">Mobilization:<\u002Fstrong> $72M private lending per $13.5M unfunded IFC — ~5.3× on a notional basis.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(3,80,118,.52);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>The ask<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 14 CLOSE -->\n    <section id=\"s14\" style=\"min-height:100%;position:relative;display:flex;align-items:center;box-sizing:border-box;scroll-snap-align:start;background:#035076;background-image:radial-gradient(rgba(255,255,255,.055) 1px, transparent 1.2px);background-size:26px 26px;color:#EAF3EE;\">\n      <div style=\"width:100%;max-width:1180px;margin:0 auto;padding:clamp(72px,9vh,108px) clamp(22px,4.5vw,60px);box-sizing:border-box;\">\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:#8FCB9B;margin-bottom:14px;\"><span style=\"color:#fff;margin-right:10px;padding-right:10px;border-right:1.5px solid rgba(255,255,255,.3);\">14<\u002Fspan>Partner with us<\u002Fdiv>\n        <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.5vw,44px);font-weight:500;line-height:1.1;letter-spacing:-.012em;color:#fff;text-wrap:balance;\">A catalytic architecture, ready to unlock private warehouse investment.<\u002Fh2>\n        <p style=\"font-size:clamp(16.5px,1.5vw,19px);line-height:1.6;color:rgba(234,243,238,.82);max-width:68ch;margin:0 0 4px;\">ASIFF unlocks private investment in accredited warehousing while preserving meaningful risk participation at every level — <strong style=\"color:#fff;font-weight:600;\">NCGCL as principal guarantor, an unfunded IFC facility behind it, and a pre-funded reserve that makes fixed-rate lending bankable.<\u002Fstrong><\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.06em;color:#8FCB9B;border:1px solid rgba(143,203,155,.4);border-radius:6px;padding:3px 8px;\">IFC<\u002Fspan><p style=\"margin:0;font-size:13.5px;line-height:1.45;color:rgba(234,243,238,.82);\"><strong style=\"color:#fff;\">Development partners.<\u002Fstrong> Co-invest catalytic, unfunded credit capacity alongside a pre-funded rate reserve.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.06em;color:#8FCB9B;border:1px solid rgba(143,203,155,.4);border-radius:6px;padding:3px 8px;\">NCGCL<\u002Fspan><p style=\"margin:0;font-size:13.5px;line-height:1.45;color:rgba(234,243,238,.82);\"><strong style=\"color:#fff;\">Principal guarantor.<\u002Fstrong> Single PFI-facing counterparty; carries the guarantee on its own book.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.06em;color:#8FCB9B;border:1px solid rgba(143,203,155,.4);border-radius:6px;padding:3px 8px;\">PFIs<\u002Fspan><p style=\"margin:0;font-size:13.5px;line-height:1.45;color:rgba(234,243,238,.82);\"><strong style=\"color:#fff;\">Lenders &amp; sponsors.<\u002Fstrong> Provide senior debt and 40% equity; retain uncapped residual exposure.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.06em;color:#8FCB9B;border:1px solid rgba(143,203,155,.4);border-radius:6px;padding:3px 8px;\">Govt<\u002Fspan><p style=\"margin:0;font-size:13.5px;line-height:1.45;color:rgba(234,243,238,.82);\"><strong style=\"color:#fff;\">Regulators.<\u002Fstrong> SECP and provincial bodies enabling accreditation and EWR market infrastructure.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 18px;font-size:15.5px;line-height:1.55;color:rgba(234,243,238,.85);\"><strong style=\"color:#fff;\">The invitation:<\u002Fstrong> partner with NCGCL to build the accredited storage capacity, inventory finance and market institutions Pakistan's post-procurement wheat economy requires — at commercial scale.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:13px;display:flex;justify-content:space-between;gap:16px;padding:0 clamp(22px,4.5vw,60px);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(234,243,238,.5);pointer-events:none;\"><span>{{ footerLabel }}<\u002Fspan><span>Partner with us<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;showRail&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Navigation&quot;},&quot;footerLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ASIFF · Concept Paper · 2026&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Navigation&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.scrollRef = React.createRef();\n    this.sections = [\n      { id: 's1', label: 'Cover' },\n      { id: 's2', label: 'Introduction' },\n      { id: 's3', label: 'Two Constraints' },\n      { id: 's4', label: 'Storage Thesis' },\n      { id: 's5', label: 'The Gap & Facility' },\n      { id: 's6', label: 'Geographic Strategy' },\n      { id: 's7', label: 'Warehouse Model' },\n      { id: 's8', label: 'Financial Architecture' },\n      { id: 's9', label: 'Risk-Sharing' },\n      { id: 's10', label: 'Institutional Roles' },\n      { id: 's11', label: 'Roadmap' },\n      { id: 's12', label: 'Key Risks' },\n      { id: 's13', label: 'Indicative Ask' },\n      { id: 's14', label: 'Partner With Us' }\n    ];\n    this.state = { activeIndex: 0, progressPct: 0 };\n    this.onScroll = this.onScroll.bind(this);\n    this.onKeyDown = this.onKeyDown.bind(this);\n    this.goTo = this.goTo.bind(this);\n  }\n\n  componentDidMount() {\n    var el = this.scrollRef.current;\n    if (!el) return;\n    var self = this;\n    this.sectionEls = this.sections.map(function (s) { return el.querySelector('#' + s.id); }).filter(Boolean);\n\n    if ('IntersectionObserver' in window) {\n      this.io = new IntersectionObserver(function (entries) {\n        entries.forEach(function (en) {\n          if (en.isIntersecting) {\n            var idx = self.sectionEls.indexOf(en.target);\n            if (idx >= 0) self.setState({ activeIndex: idx });\n          }\n        });\n      }, { root: el, threshold: 0.55 });\n      this.sectionEls.forEach(function (s) { self.io.observe(s); });\n    }\n\n    el.addEventListener('scroll', this.onScroll, { passive: true });\n    window.addEventListener('keydown', this.onKeyDown);\n  }\n\n  componentWillUnmount() {\n    if (this.io) this.io.disconnect();\n    var el = this.scrollRef.current;\n    if (el) el.removeEventListener('scroll', this.onScroll);\n    window.removeEventListener('keydown', this.onKeyDown);\n  }\n\n  onScroll() {\n    var el = this.scrollRef.current;\n    if (!el) return;\n    var max = el.scrollHeight - el.clientHeight;\n    var p = max > 0 ? el.scrollTop / max : 0;\n    this.setState({ progressPct: Math.round(p * 1000) / 10 });\n  }\n\n  onKeyDown(e) {\n    if (e.altKey || e.ctrlKey || e.metaKey) return;\n    var tag = (e.target && e.target.tagName) || '';\n    if (tag === 'INPUT' || tag === 'TEXTAREA') return;\n    if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); this.goTo(this.state.activeIndex + 1); }\n    else if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); this.goTo(this.state.activeIndex - 1); }\n    else if (e.key === 'Home') { e.preventDefault(); this.goTo(0); }\n    else if (e.key === 'End') { e.preventDefault(); this.goTo(this.sections.length - 1); }\n  }\n\n  goTo(idx) {\n    if (!this.sectionEls || idx < 0 || idx >= this.sectionEls.length) return;\n    var el = this.scrollRef.current;\n    var target = this.sectionEls[idx];\n    if (el && target) el.scrollTo({ top: target.offsetTop, behavior: 'smooth' });\n  }\n\n  pad(n) { return (n < 10 ? '0' : '') + n; }\n\n  renderVals() {\n    var self = this;\n    var showRail = this.props.showRail !== false;\n    var navItems = this.sections.map(function (s, i) {\n      var active = i === self.state.activeIndex;\n      return {\n        id: s.id,\n        label: s.label,\n        onClick: function () { self.goTo(i); },\n        dotBg: active ? '#39A949' : 'transparent',\n        dotBorder: active ? '#39A949' : 'rgba(3,80,118,.32)',\n        lblOpacity: active ? 1 : 0,\n        lblColor: active ? '#035076' : 'rgba(3,80,118,.52)'\n      };\n    });\n    return {\n      scrollRef: this.scrollRef,\n      navItems: navItems,\n      showRail: showRail,\n      progressWidth: this.state.progressPct + '%',\n      counterText: this.pad(this.state.activeIndex + 1) + ' / ' + this.sections.length,\n      footerLabel: this.props.footerLabel || 'ASIFF · Concept Paper · 2026'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
