// ─── HELPERS ──────────────────────────────────────────────────────────────────
function css(obj) {
  return Object.entries(obj).map(([k, v]) => {
    const prop = k.replace(/([A-Z])/g, m => '-' + m.toLowerCase());
    return `${prop}:${v}`;
  }).join(';');
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'style' && typeof v === 'object') {
        e.style.cssText = css(v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'className') {
        e.className = v;
      } else if (k === 'innerHTML') {
        e.innerHTML = v;
      } else {
        e.setAttribute(k, v);
      }
    });
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') {
      e.appendChild(document.createTextNode(String(c)));
    } else if (c instanceof Node) {
      e.appendChild(c);
    }
  });
  return e;
}

// ─── SVG HELPERS ──────────────────────────────────────────────────────────────
function svgEl(tag, attrs, ...children) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'style' && typeof v === 'object') {
        e.style.cssText = css(v);
      } else {
        e.setAttribute(k, v);
      }
    });
  }
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') {
      e.appendChild(document.createTextNode(c));
    } else if (c instanceof Node) {
      e.appendChild(c);
    }
  });
  return e;
}

function SparkLine(data, color = A.cerulean, height = 72, yKey = 'outstanding') {
  const vals = data.map(d => d[yKey]);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const w = 400, h = height;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * (w - 20) + 10;
    const y = h - ((v - mn) / (mx - mn || 1)) * (h - 22) - 11;
    return `${x},${y}`;
  }).join(' ');
  const area = `10,${h} ${pts} ${w - 10},${h}`;

  const svg = svgEl('svg', { viewBox: `0 0 ${w} ${h}`, style: { width: '100%', height: String(height) + 'px' }, preserveAspectRatio: 'none' });
  const defs = svgEl('defs');
  const grad = svgEl('linearGradient', { id: 'sg3', x1: '0', y1: '0', x2: '0', y2: '1' });
  grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': color, 'stop-opacity': '0.15' }));
  grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': color, 'stop-opacity': '0.01' }));
  defs.appendChild(grad);
  svg.appendChild(defs);
  svg.appendChild(svgEl('polygon', { points: area, fill: 'url(#sg3)' }));
  svg.appendChild(svgEl('polyline', { points: pts, fill: 'none', stroke: color, 'stroke-width': '2', 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
  vals.forEach((v, i) => {
    const x = (i / (vals.length - 1)) * (w - 20) + 10;
    const y = h - ((v - mn) / (mx - mn || 1)) * (h - 22) - 11;
    const isAlert = data[i].alert;
    const r = i === vals.length - 1 ? 5.5 : isAlert ? 5 : 2.5;
    svg.appendChild(svgEl('circle', {
      cx: String(x), cy: String(y), r: String(r),
      fill: isAlert ? A.orange : color,
      stroke: isAlert ? A.surface : 'none', 'stroke-width': '1.5',
      opacity: i === vals.length - 1 || isAlert ? '1' : '0.45'
    }));
  });
  return svg;
}

function Gauge(value, max, label, color, size = 90) {
  const pct = Math.min(value / max, 1);
  const r = size / 2 - 11;
  const arc = pct * Math.PI * r;
  const total = Math.PI * r;

  const svg = svgEl('svg', { width: String(size), height: String(size / 2 + 12), viewBox: `0 0 ${size} ${size / 2 + 12}` });
  svg.appendChild(svgEl('path', { d: `M 11 ${size / 2} A ${r} ${r} 0 0 1 ${size - 11} ${size / 2}`, fill: 'none', stroke: A.lightGray, 'stroke-width': '9', 'stroke-linecap': 'round' }));
  svg.appendChild(svgEl('path', { d: `M 11 ${size / 2} A ${r} ${r} 0 0 1 ${size - 11} ${size / 2}`, fill: 'none', stroke: color, 'stroke-width': '9', 'stroke-linecap': 'round', 'stroke-dasharray': `${arc} ${total}` }));
  const txt = svgEl('text', { x: String(size / 2), y: String(size / 2 - 1), 'text-anchor': 'middle', fill: color, 'font-size': '14', 'font-weight': '700', 'font-family': "'Poppins',sans-serif" });
  txt.textContent = value + '%';
  svg.appendChild(txt);

  return el('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' } },
    svg,
    el('div', { style: { fontSize: '10px', fontWeight: 500, color: A.textMid, textAlign: 'center', fontFamily: "'Poppins',sans-serif" } }, label)
  );
}

function Card(children, style = {}, className = '') {
  const div = el('div', {
    className: `card-hover ${className}`,
    style: { background: A.surface, borderRadius: '10px', border: `1px solid ${A.border}`, boxShadow: '0 1px 5px rgba(20,20,19,0.05)', padding: '22px', ...style }
  });
  if (Array.isArray(children)) {
    children.forEach(c => c && div.appendChild(c));
  } else if (children) {
    div.appendChild(children);
  }
  return div;
}

  const topRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '22px' } },

// ─── ANNEX TAB ─────────────────────────────────────────────────────────────────
function renderAnnexTab() {
  const totalRow = annexAData.reduce((acc, r) => ({
    total: acc.total + r.total, tfin: acc.tfin + r.tfin, wc: acc.wc + r.wc,
    fi: acc.fi + r.fi, const_: acc.const_ + r.const_, other: acc.other + r.other
  }), { total: 0, tfin: 0, wc: 0, fi: 0, const_: 0, other: 0 });

  const annexHead = el('thead', {},
    el('tr', {}, ...['Sector','Total (PKR Mn)','Trade Finance','Working Capital','Fixed Investment','Construction','Other'].map((h,i) => TH(h, i===0))),

      ...['','100%','% of total','% of total','% of total','% of total','% of total'].map((h,i) =>
        el('th', { style: { color: 'rgba(250,249,245,0.65)', padding: '4px 11px', textAlign: i===0 ? 'left' : 'center', fontFamily: "'Lora','Georgia',serif", fontStyle: 'italic', fontSize: '9.5px', fontWeight: 400 } }, h)

      el('td', { style: { padding: '7px 11px', textAlign: 'right', color: A.textLight, fontFamily: "'Poppins',sans-serif", fontSize: '11px' } }, r.tfin > 0 ? r.tfin.toLocaleString() : '—'),

        el('span', { style: { fontSize: '9.5px', color: A.textLight } }, '(' + wcPct + '%)')
      ),
      el('td', { style: { padding: '7px 11px', textAlign: 'right', color: parseInt(fiPct) > 50 ? A.orange : A.textLight, fontWeight: parseInt(fiPct) > 50 ? 600 : 400, fontFamily: "'Poppins',sans-serif", fontSize: '11px' } },
        r.fi.toLocaleString() + ' ',
        el('span', { style: { fontSize: '9.5px', color: A.textLight } }, '(' + fiPct + '%)')
      ),
      el('td', { style: { padding: '7px 11px', textAlign: 'right', color: A.textLight, fontFamily: "'Poppins',sans-serif", fontSize: '11px' } }, r.const_ > 0 ? r.const_.toLocaleString() : '—'),
      el('td', { style: { padding: '7px 11px', textAlign: 'right', color: A.textLight, fontFamily: "'Poppins',sans-serif", fontSize: '11px' } }, r.other > 0 ? r.other.toLocaleString() : '—')
    );
  });

  const totalTR = el('tr', { style: { background: A.cerulean } },
    el('td', { style: { padding: '9px 11px', color: A.light, fontWeight: 700, fontFamily: "'Poppins',sans-serif" } }, 'TOTAL'),
    ...[totalRow.total, totalRow.tfin, totalRow.wc, totalRow.fi, totalRow.const_, totalRow.other].map(v =>

  ], { overflowX: 'auto' });

  const summaryItems = [
    { label: 'WC-Dominant Sectors', val: 'Manufacturing, Trade', note: 'Rollover risk · Liquidity cliff if banks tighten', color: A.cerulean },
    { label: 'FI-Dominant Sectors', val: 'Transport, Education, Real Estate', note: 'Refinancing risk at sustained high rates', color: A.orange },
    { label: 'Balanced Mix Sectors', val: 'Construction, Services, ICT', note: 'Mixed collateral profile · Moderate risk', color: A.blue },
    { label: 'Trade Finance Leaders', val: 'Manufacturing (PKR 29.4 Bn), Trade (PKR 5.2 Bn)', note: 'FX and documentary risk exposure', color: A.green },
  ];

  const summaryCards = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(195px,1fr))', gap: '13px', marginTop: '16px' } },

    ], { borderLeft: `3px solid ${c.color}` }))

  return el('div', {},
    SectionHeader('A', 'Annex A — Full Sector Totals by Financing Type (Dec-25)', 'ISIC Table 3.14 · PKR Millions · Trade Finance / Working Capital / Fixed Investment / Construction / Other'),
    AlertBox('new', 'Complete Type Breakdown — New Data', 'Full Dec-25 sector × financing-type matrix. Enables sector-level WC rollover risk analysis, FI refinancing risk, and collateral assessment by sector.'),

        el('div', { style: { textAlign: 'right' } },
          el('div', { style: { fontSize: '9.5px', color: 'rgba(250,249,245,0.4)', fontFamily: "'Poppins',sans-serif", letterSpacing: '0.12em', textTransform: 'uppercase' } }, 'Restricted — MoF & Board Use Only'),
          el('div', { style: { fontSize: '11px', color: 'rgba(250,249,245,0.55)', fontFamily: "'Lora','Georgia',serif", fontStyle: 'italic', marginTop: '2px' } }, 'SBP/SME-RAD/2026-04 · Updated February 20, 2026'),
          el('div', { style: { fontSize: '10px', color: 'rgba(250,249,245,0.35)', fontFamily: "'Lora','Georgia',serif", fontStyle: 'italic' } }, 'Data: ISIC Table 3.14 (Dec-25) · Table 1.9 (Dec-25) · SBP SME (Jan-26)')
        )
      ),
      el('div', { style: { borderTop: '1px solid rgba(250,249,245,0.1)', paddingTop: '18px', paddingBottom: 0 } },
        el('div', { style: { fontSize: '11px', fontFamily: "'Poppins',sans-serif", fontWeight: 500, color: A.orange, letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: '8px' } },
          'Risk Assessment',
          Slash(A.orange, 11),
          'Guarantee Scheme Liability Forecast',
          Slash(A.orange, 11),
          'v2.0'
        ),
        el('div', { style: { fontSize: '24px', fontWeight: 600, color: A.light, fontFamily: "'Poppins',sans-serif", lineHeight: 1.25, letterSpacing: '-0.01em', maxWidth: '700px' } },
          'SME Financing Portfolio',
          el('br'),
          el('span', { style: { color: 'rgba(250,249,245,0.6)', fontWeight: 400, fontFamily: "'Lora','Georgia',serif", fontStyle: 'italic', fontSize: '18px' } }, 'Comprehensive update with SBP Dec-25 data integration')
        ),
        el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', marginTop: '18px', paddingBottom: 0 } }, ...audienceBtns)
      )
    )
  );

  // Audience strip
  let audienceStrip = null;
  if (state.audienceView !== 'all' && audienceMessages[state.audienceView]) {
    const am = audienceMessages[state.audienceView];
    audienceStrip = el('div', { style: { background: A.cerulean, padding: '14px 28px', borderBottom: `1px solid ${A.cyan}` } },
      el('div', { style: { maxWidth: '1280px', margin: '0 auto' } },
        el('div', { style: { color: A.light, fontWeight: 600, fontSize: '13.5px', fontFamily: "'Poppins',sans-serif", marginBottom: '9px' } }, am.headline),
        el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '7px' } },
          ...am.bullets.map(b => el('div', { style: { background: 'rgba(250,249,245,0.1)', borderRadius: '6px', padding: '5px 12px', fontSize: '11.5px', color: 'rgba(250,249,245,0.88)', fontFamily: "'Lora','Georgia',serif", maxWidth: '380px', border: '1px solid rgba(250,249,245,0.12)' } },
            el('span', { style: { color: A.green, fontWeight: 700, marginRight: '6px' } }, '›'), b
          ))
        )
      )
    );
  }

  // Nav tabs
  const navBtns = tabs.map(t => {
    const btn = el('button', {
      className: 'tab-btn',
      style: {
        background: 'transparent', border: 'none', padding: '11px 15px', cursor: 'pointer',
        fontSize: '11.5px', fontWeight: state.activeTab === t.id ? 600 : 400,
        color: state.activeTab === t.id ? A.cerulean : A.textMid,
        fontFamily: "'Poppins',sans-serif", letterSpacing: '0.02em',
        borderBottom: state.activeTab === t.id ? `2.5px solid ${A.cerulean}` : '2.5px solid transparent',
        whiteSpace: 'nowrap', transition: 'color 0.15s',
      }
    },
      el('span', { style: { marginRight: '5px', fontSize: '10px', opacity: 0.5 } }, t.icon), t.label
    );
    btn.addEventListener('click', () => setState({ activeTab: t.id }));
    return btn;
  });

  const nav = el('div', { style: { background: A.surface, borderBottom: `1.5px solid ${A.border}`, position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 1px 4px rgba(20,20,19,0.06)' } },
    el('div', { style: { maxWidth: '1280px', margin: '0 auto', padding: '0 28px', display: 'flex', overflowX: 'auto', gap: 0 } }, ...navBtns)
  );

  const content = el('div', { style: { maxWidth: '1280px', margin: '0 auto', padding: '32px 28px 80px' } },
    el('div', { className: 'fi' }, renderContent())
  );

  const footer = el('div', { style: { background: A.dark, padding: '20px 28px', borderTop: '1px solid rgba(250,249,245,0.07)' } },
    el('div', { style: { maxWidth: '1280px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '10px' } },
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
        NCGCLLogo(22),
        el('span', { style: { color: 'rgba(250,249,245,0.4)', fontSize: '10.5px', fontFamily: "'Lora','Georgia',serif", fontStyle: 'italic' } }, '© 2026 Risk & Analytics Division')
      ),
      el('div', { style: { color: 'rgba(250,249,245,0.3)', fontSize: '10px', fontFamily: "'Poppins',sans-serif", letterSpacing: '0.04em' } },
        'Sources: SBP Table 3.14 (Dec-25) · Table 1.9 (Dec-25) · SME Snapshot (Sep-25) · Monetary Statistics (Jan-26)',
        Slash('rgba(250,249,245,0.2)', 9),
        'Classified Restricted · v2.0 · Feb 20, 2026'
      )
    )
  );

  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(header);
  if (audienceStrip) app.appendChild(audienceStrip);
  app.appendChild(nav);
  app.appendChild(content);
  app.appendChild(footer);
}

render();
</script>
</body>
</html>
