<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BCGC Recommendations to the Board · 11th Board Meeting · NCGCL</title>
<style>
/* ================= NCGCL design tokens (condensed from ncgcl-design skill) ================= */
@import url("https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..700&display=swap");
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap");

:root{
  --ncgcl-blue:#0C688D; --ncgcl-green:#39A935;
  --petrol-900:#042B3B; --petrol-800:#004C66; --petrol-700:#035076; --petrol-600:#0C688D;
  --petrol-400:#007AA0; --petrol-200:#A7C7D6; --petrol-100:#E3EEF3;
  --green-800:#1F6A1D; --green-700:#2B8129; --green-600:#39A935; --green-100:#E6F4E2;
  --ink-900:#061626; --ink-800:#0E2841; --ink-700:#1E293B;
  --slate-500:#5B6B7A; --slate-400:#7F7F7F; --slate-300:#AEAEAE; --slate-200:#C8D6E0;
  --slate-150:#E2E8F0; --slate-100:#EEF1F4; --slate-50:#F6F8FA; --paper:#FFFFFF;
  --risk-high:#C00000; --risk-med:#BF9000; --risk-low:#2B8129;

  --color-primary:var(--ncgcl-blue); --color-primary-hover:#0A5876;
  --color-accent:var(--ncgcl-green);
  --text-strong:var(--ink-800); --text-body:#1F2E3A; --text-muted:var(--slate-400); --text-faint:var(--slate-300);
  --text-on-dark:#FFFFFF; --text-on-dark-muted:#B9CFDA;
  --surface-page:#FFFFFF; --surface-canvas:var(--slate-50); --surface-card:#FFFFFF; --surface-muted:var(--slate-100);
  --surface-accent-soft:var(--green-100); --surface-primary-soft:var(--petrol-100);
  --border-subtle:var(--slate-200); --border-strong:#9FB5C4;

  --font-sans:"Figtree","Google Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:"IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --text-h1:3.052rem; --text-h2:2.441rem; --text-h3:1.953rem; --text-h4:1.563rem; --text-h5:1.25rem;
  --text-lg:1.125rem; --text-base:1rem; --text-sm:0.875rem; --text-xs:0.75rem; --text-2xs:0.6875rem;
  --tracking-eyebrow:0.14em; --tracking-wide:0.04em;

  --space-2:0.5rem; --space-3:0.75rem; --space-4:1rem; --space-5:1.5rem; --space-6:2rem;
  --radius-sm:5px; --radius-md:8px; --radius-lg:12px; --radius-pill:999px;
  --border-accent:3px;
  --shadow-sm:0 1px 3px rgba(6,22,38,.08), 0 1px 2px rgba(6,22,38,.04);
  --shadow-md:0 4px 12px rgba(6,22,38,.08), 0 2px 4px rgba(6,22,38,.05);
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family:var(--font-sans); background:var(--surface-canvas); color:var(--text-body);
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
.wrap{ max-width:1180px; margin:0 auto; padding:0 28px 80px; }

/* ---------- Topbar ---------- */
.topbar{ background:var(--petrol-900); color:#fff; }
.topbar-inner{ max-width:1180px; margin:0 auto; padding:22px 28px; display:flex; align-items:center; gap:16px; }
.topbar .mark{ width:44px; height:44px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; flex:none; }
.topbar .mark img{ height:27px; }
.topbar .titles{ flex:1; min-width:0; }
.topbar h1{ margin:0; font-size:var(--text-h5); font-weight:700; letter-spacing:-0.01em; color:#fff; }
.topbar .sub{ margin-top:3px; font-size:var(--text-sm); color:var(--text-on-dark-muted); }
.rating{ display:inline-flex; align-items:center; gap:6px; background:var(--petrol-900); border:1px solid rgba(255,255,255,.28);
  color:#fff; font-size:var(--text-2xs); font-weight:700; letter-spacing:var(--tracking-wide); text-transform:uppercase;
  padding:5px 12px; border-radius:var(--radius-sm); white-space:nowrap; }

/* ---------- Tab nav ---------- */
.tabnav{ position:sticky; top:0; z-index:30; background:#fff; border-bottom:1px solid var(--border-subtle);
  box-shadow:0 1px 0 rgba(6,22,38,.02); }
.tabnav-inner{ max-width:1180px; margin:0 auto; padding:0 28px; display:flex; gap:4px; overflow-x:auto; }
.tab-btn{ position:relative; display:inline-flex; align-items:center; gap:8px; padding:16px 16px; border:none;
  background:transparent; cursor:pointer; font-family:var(--font-sans); font-size:var(--text-sm); font-weight:500;
  color:var(--text-muted); border-bottom:3px solid transparent; white-space:nowrap; transition:color .15s; }
.tab-btn .n{ font-family:var(--font-mono); font-size:10px; background:var(--surface-muted); color:var(--text-muted);
  padding:1px 7px; border-radius:999px; }
.tab-btn.active{ color:var(--color-primary); font-weight:700; border-bottom-color:var(--color-primary); }
.tab-btn.active .n{ background:var(--surface-primary-soft); color:var(--petrol-700); }
.tab-btn:hover:not(.active){ color:var(--ink-700); }

/* ---------- Sections ---------- */
.page{ display:none; padding-top:32px; }
.page.active{ display:block; animation:fade .2s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

.eyebrow{ font-size:var(--text-2xs); font-weight:700; text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); color:var(--color-primary); }
h2.section-title{ margin:8px 0 4px; font-size:var(--text-h3); font-weight:700; letter-spacing:-0.02em; color:var(--text-strong); }
.section-sub{ font-size:var(--text-sm); color:var(--text-muted); margin-bottom:24px; max-width:760px; }

.sub-eyebrow{ display:flex; align-items:baseline; justify-content:space-between; margin:0 0 14px; }
.sub-eyebrow span.lbl{ font-size:var(--text-2xs); font-weight:700; text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); color:var(--text-muted); }

/* ---------- Card ---------- */
.card{ position:relative; background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg);
  padding:var(--space-6); box-shadow:var(--shadow-sm); }
.card.accent-primary{ border-top:var(--border-accent) solid var(--color-primary); }
.card.accent-green{ border-top:var(--border-accent) solid var(--color-accent); }
.card.accent-med{ border-top:var(--border-accent) solid var(--risk-med); }
.card + .card{ margin-top:20px; }

/* ---------- Stat block ---------- */
.statgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:28px; }
.stat{ background:#fff; border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:22px 22px; box-shadow:var(--shadow-sm); }
.stat.rule-primary{ border-left:var(--border-accent) solid var(--color-primary); }
.stat.rule-green{ border-left:var(--border-accent) solid var(--color-accent); }
.stat.rule-med{ border-left:var(--border-accent) solid var(--risk-med); }
.stat.rule-neutral{ border-left:var(--border-accent) solid var(--slate-400); }
.stat .val{ font-family:var(--font-mono); font-size:var(--text-h3); font-weight:600; color:var(--text-strong); letter-spacing:-0.01em; line-height:1; }
.stat .lab{ margin-top:8px; font-size:var(--text-sm); font-weight:700; color:var(--text-body); }
.stat .cap{ margin-top:3px; font-size:var(--text-xs); color:var(--text-muted); line-height:1.4; }

/* ---------- Badge ---------- */
.badge{ display:inline-flex; align-items:center; gap:6px; font-size:var(--text-xs); font-weight:700; letter-spacing:var(--tracking-wide);
  text-transform:uppercase; padding:3px 11px; border-radius:var(--radius-sm); line-height:1.6; white-space:nowrap; }
.badge.primary{ background:var(--surface-primary-soft); color:var(--petrol-700); }
.badge.green{ background:var(--surface-accent-soft); color:var(--green-800); }
.badge.med{ background:#FBF1DA; color:#8A6800; }
.badge.neutral{ background:var(--surface-muted); color:var(--ink-700); border:1px solid var(--border-subtle); }
.badge .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; flex:none; }

/* ---------- Table ---------- */
.tablewrap{ width:100%; overflow-x:auto; border:1px solid var(--border-subtle); border-radius:var(--radius-lg); background:#fff; }
table{ width:100%; border-collapse:collapse; font-family:var(--font-sans); }
th{ text-align:left; padding:13px 16px; font-size:var(--text-2xs); font-weight:700; letter-spacing:var(--tracking-eyebrow);
  text-transform:uppercase; color:var(--text-muted); background:var(--surface-muted); border-bottom:1px solid var(--border-subtle); white-space:nowrap; }
td{ padding:14px 16px; font-size:var(--text-sm); color:var(--text-body); border-bottom:1px solid var(--border-subtle); vertical-align:top; }
tr:last-child td{ border-bottom:none; }
td.mono{ font-family:var(--font-mono); font-weight:500; }
td.right, th.right{ text-align:right; }
td.center, th.center{ text-align:center; }
.rowlabel{ font-weight:700; color:var(--text-strong); }
.rowsub{ font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
tr.total td{ background:var(--surface-muted); font-weight:700; color:var(--text-strong); }

/* ---------- Callout ---------- */
.callout{ display:flex; background:var(--surface-primary-soft); border-radius:var(--radius-md); border-left:var(--border-accent) solid var(--color-primary);
  padding:18px 22px; margin-top:18px; }
.callout.med{ background:#FBF1DA; border-left-color:var(--risk-med); }
.callout.green{ background:var(--surface-accent-soft); border-left-color:var(--color-accent); }
.callout .body{ flex:1; }
.callout .title{ font-weight:700; font-size:var(--text-base); color:var(--text-strong); margin-bottom:8px; letter-spacing:-0.01em; }
.callout .pair{ display:grid; grid-template-columns:96px 1fr; gap:10px; align-items:baseline; margin-top:8px; }
.callout .pair:first-of-type{ margin-top:0; }
.callout .pair .k{ font-size:var(--text-2xs); font-weight:700; letter-spacing:var(--tracking-eyebrow); text-transform:uppercase; color:var(--petrol-700); }
.callout.med .pair .k{ color:#8A6800; }
.callout .pair .v{ font-size:var(--text-sm); color:var(--text-body); line-height:1.55; }

/* ---------- Progress meter ---------- */
.meter{ width:100%; margin-bottom:16px; }
.meter:last-child{ margin-bottom:0; }
.meter .top{ display:flex; justify-content:space-between; margin-bottom:6px; }
.meter .top .l{ font-size:var(--text-sm); font-weight:500; color:var(--text-body); }
.meter .top .v{ font-family:var(--font-mono); font-size:var(--text-sm); font-weight:600; color:var(--text-strong); }
.meter .track{ width:100%; height:10px; border-radius:999px; background:var(--slate-150); overflow:hidden; }
.meter .fill{ height:100%; border-radius:999px; }
.fill.primary{ background:var(--color-primary); }
.fill.green{ background:var(--color-accent); }
.fill.med{ background:var(--risk-med); }

/* ---------- Term grid (per-transaction key terms) ---------- */
.termgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin:18px 0 4px; padding:18px; background:var(--surface-muted); border-radius:var(--radius-md); }
.term .k{ font-size:var(--text-2xs); font-weight:700; text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); color:var(--text-muted); }
.term .v{ margin-top:4px; font-family:var(--font-mono); font-size:var(--text-sm); font-weight:600; color:var(--text-strong); }

.card-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:6px; flex-wrap:wrap; }
.card-head h3{ margin:0; font-size:var(--text-h5); font-weight:700; color:var(--text-strong); letter-spacing:-0.01em; }
.card-head .amt{ font-family:var(--font-mono); font-size:var(--text-h4); font-weight:600; color:var(--text-strong); white-space:nowrap; }
.card-meta{ font-size:var(--text-xs); color:var(--text-muted); margin-bottom:2px; }
.card p.body-text{ font-size:var(--text-sm); color:var(--text-body); line-height:1.65; margin:12px 0 0; }
.card p.body-text strong.lead{ color:var(--text-strong); }

.footer{ margin-top:56px; padding:22px 0; border-top:1px solid var(--border-subtle); display:flex; align-items:center;
  justify-content:space-between; font-size:var(--text-xs); color:var(--text-muted); }

@media (max-width:920px){
  .statgrid{ grid-template-columns:repeat(2,1fr); }
  .termgrid{ grid-template-columns:repeat(2,1fr); }
}
@media print{
  .tabnav{ position:static; }
  .page{ display:block !important; page-break-before:always; }
  .page:first-child{ page-break-before:auto; }
}
</style>
</head>

function txCard(t){

      <div class="pair"><div class="k">Committee Basis</div><div class="v">${t.dev.action_}</div></div>

  return `
  <div class="card ${accentClass}">
    <div class="card-meta">${t.meeting}</div>

}
